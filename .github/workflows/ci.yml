name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── Shell script linting ────────────────────────────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" \
            | xargs shellcheck --severity=warning

  # ── Fixture tests (no credentials needed) ──────────────────────────────────
  fixture-tests:
    name: Fixture tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run fixture test suite
        run: |
          chmod +x tests/run_fixture_test.sh tests/run_stage.sh tests/mock-env.sh
          ./tests/run_fixture_test.sh

  # ── Docker image build ──────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: loop-engineer:ci
          # Cache layers between runs to keep build times short
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test — verify binaries are present
        run: |
          docker run --rm loop-engineer:ci bash -c "
            set -e
            opencode --version
            php --version
            composer --version
            wp --info
            node --version
            gh --version
            chromium-browser --version || chromium --version
          "
